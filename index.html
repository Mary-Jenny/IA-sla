<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forest Bird - Estilo Flappy Bird</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for a premium look -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-layer">
            <div id="start-screen" class="screen">
                <h1>FOREST BIRD</h1>
                <p>Pressione <strong>ESPAÇO</strong> ou toque para iniciar</p>
                <div class="instructions">
                    Desvie das árvores e colete moedas!
                </div>
            </div>
            <div id="game-over-screen" class="screen hidden">
                <h1>FIM DE JOGO</h1>
                <div class="stats">
                    <p>Árvores Superadas: <span id="final-score">0</span></p>
                    <p>Moedas: <span id="final-coins">0</span></p>
                    <p>Total Acumulado: 🪙 <span id="total-coins">0</span></p>
                </div>

                <div id="skin-shop">
                    <h3>LOJA DE SKINS</h3>
                    <div class="shop-items">
                        <div class="shop-item owned" data-skin="yellow" data-price="0">
                            <div class="skin-preview" style="background: #FFD700"></div>
                            <span>Padrão</span>
                        </div>
                        <div class="shop-item" data-skin="red" data-price="10">
                            <div class="skin-preview" style="background: #ff4d4d"></div>
                            <span>Fênix (10)</span>
                        </div>
                        <div class="shop-item" data-skin="blue" data-price="25">
                            <div class="skin-preview" style="background: #4da6ff"></div>
                            <span>Gelo (25)</span>
                        </div>
                        <div class="shop-item" data-skin="purple" data-price="50">
                            <div class="skin-preview" style="background: #a64dff"></div>
                            <span>Vazio (50)</span>
                        </div>
                    </div>
                </div>

                <p style="margin-top: 20px;">Pressione <strong>ESPAÇO</strong> para reiniciar</p>
            </div>
            <div id="score-board" class="hidden">
                <div class="score-item">🌳: <span id="current-score">0</span></div>
                <div class="score-item">🪙: <span id="current-coins">0</span></div>
            </div>
        </div>
    </div>
    <script src="game.js?v=2.0"></script>
</body>

</html>
