<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forest Bird - Estilo Flappy Bird</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for a premium look -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-layer">
            <div id="start-screen" class="screen">
                <h1>FOREST BIRD</h1>
                <p>Pressione <strong>ESPAÇO</strong> ou toque para iniciar</p>
                <div class="instructions">
                    Desvie das árvores e colete moedas!
                </div>
            </div>
            <div id="game-over-screen" class="screen hidden">
                <h1>FIM DE JOGO</h1>
                <div class="stats">
                    <p>Árvores Superadas: <span id="final-score">0</span></p>
                    <p>Recorde Atual: ⭐ <span id="high-score">0</span></p>
                    <p>Moedas: <span id="final-coins">0</span></p>
                    <p>Total Acumulado: 🪙 <span id="total-coins">0</span></p>
                </div>

                <div id="skin-shop">
                    <h3>LOJA DE SKINS</h3>
                    <div class="shop-items">
                        <div class="shop-item owned" data-skin="yellow" data-price="0">
                            <div class="skin-preview" style="background: linear-gradient(#FFD700, #FFA500)"></div>
                            <span>Padrão</span>
                        </div>
                        <div class="shop-item" data-skin="red" data-price="10">
                            <div class="skin-preview" style="background: linear-gradient(#ff4d4d, #8b0000)"></div>
                            <span>Fênix</span>
                        </div>
                        <div class="shop-item" data-skin="blue" data-price="25">
                            <div class="skin-preview" style="background: linear-gradient(#4da6ff, #004080)"></div>
                            <span>Gelo</span>
                        </div>
                        <div class="shop-item" data-skin="purple" data-price="50">
                            <div class="skin-preview" style="background: linear-gradient(#a64dff, #4b0082)"></div>
                            <span>Vazio</span>
                        </div>
                        <div class="shop-item" data-skin="emerald" data-price="75">
                            <div class="skin-preview" style="background: linear-gradient(#50c878, #006400)"></div>
                            <span>Esmeralda</span>
                        </div>
                        <div class="shop-item" data-skin="sunset" data-price="100">
                            <div class="skin-preview" style="background: linear-gradient(#ff7e5f, #feb47b)"></div>
                            <span>Ocaso</span>
                        </div>
                        <div class="shop-item" data-skin="rainbow" data-price="200">
                            <div class="skin-preview"
                                style="background: linear-gradient(to right, red, orange, yellow, green, blue, indigo, violet)">
                            </div>
                            <span>Arco-Íris</span>
                        </div>
                    </div>
                </div>

                <p style="margin-top: 20px;">Pressione <strong>ESPAÇO</strong> para reiniciar</p>
            </div>
            <div id="score-board" class="hidden">
                <div class="score-item">🌳: <span id="current-score">0</span></div>
                <div class="score-item">🪙: <span id="current-coins">0</span></div>
            </div>
        </div>
    </div>
    <script src="game.js?v=2.0"></script>
</body>

</html>
